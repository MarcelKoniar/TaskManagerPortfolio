syntax = "proto3";

option csharp_namespace = "GrpcService";

package taskmanager;

// Service definition (unary + optional server-stream)
service ToDoTaskService {
  rpc GetAll(GetAllRequest) returns (GetAllResponse);
  rpc StreamAll(GetAllRequest) returns (stream ToDoTask);
}

// Proto message exposed over gRPC
message ToDoTask {
  string id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string completed_at = 5;
}

// Filter request for GetAll
message GetAllRequest {
  string title = 1;
  string description = 2;
  string status = 3;
  string completed_at_from = 4;
  string completed_at_to = 5;
}

// Unary response with repeated tasks
message GetAllResponse {
  repeated ToDoTask tasks = 1;
}

